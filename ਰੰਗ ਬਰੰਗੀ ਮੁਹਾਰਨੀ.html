<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਰੰਗ-ਬਰੰਗੀ ਪੰਜਾਬੀ ਮੁਹਾਰਨੀ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans Gurmukhi', sans-serif;
            background-color: #f8fafc;
            user-select: none;
            touch-action: manipulation;
        }

        .flower {
            position: fixed;
            top: -50px;
            z-index: 1000;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .active-team-card {
            box-shadow: 0 0 20px rgba(234, 88, 12, 0.3);
            border: 4px solid #ea580c !important;
            transform: scale(1.02);
        }

        .muharni-scroll {
            max-height: 60vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .muharni-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .muharni-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .matra-btn {
            transition: all 0.1s ease;
        }

        .matra-btn:active {
            transform: scale(0.85);
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-orange-500">
        <!-- Scoreboard Section -->
        <div class="bg-gradient-to-r from-orange-500 to-yellow-500 p-4 text-white shadow-lg">
            <h1 class="text-2xl md:text-3xl font-black text-center mb-4">ਰੰਗ-ਬਰੰਗੀ ਪੰਜਾਬੀ ਮੁਹਾਰਨੀ</h1>
            
            <div class="flex justify-between items-center max-w-2xl mx-auto gap-4">
                <div id="teamA" class="bg-white/20 p-3 rounded-2xl text-center flex-1 border-2 border-transparent active-team-card transition-all">
                    <div class="text-xs font-bold uppercase text-orange-100">ਟੀਮ ੳ</div>
                    <div id="scoreA" class="text-3xl font-black">0</div>
                </div>
                
                <div class="text-center">
                    <div id="turnTag" class="bg-white text-orange-600 font-black px-4 py-1 rounded-full shadow-md text-sm whitespace-nowrap">ਵਾਰੀ: ਟੀਮ ੳ</div>
                </div>

                <div id="teamB" class="bg-white/20 p-3 rounded-2xl text-center flex-1 border-2 border-transparent transition-all opacity-70">
                    <div class="text-xs font-bold uppercase text-blue-100">ਟੀਮ ਅ</div>
                    <div id="scoreB" class="text-3xl font-black">0</div>
                </div>
            </div>
        </div>

        <!-- Word Input Area -->
        <div class="p-4 bg-orange-50 border-b-2 border-dashed border-orange-200">
            <div id="wordDisplay" class="flex flex-wrap justify-center gap-1 min-h-[60px] bg-white rounded-2xl border-2 border-orange-200 p-2 text-4xl font-black text-orange-600 items-center shadow-inner">
                <span class="text-gray-300 text-lg italic font-normal">ਅੱਖਰਾਂ ਨੂੰ ਛੂਹ ਕੇ ਸ਼ਬਦ ਬਣਾਓ...</span>
            </div>
            
            <div id="statusMsg" class="text-center text-sm font-bold mt-2 h-5 transition-all"></div>

            <div class="flex justify-center gap-3 mt-4">
                <button onclick="clearWord()" class="bg-red-500 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-red-600 active:scale-95 transition-all">ਮਿਟਾਓ</button>
                <button onclick="checkWord()" class="bg-green-600 text-white px-10 py-2 rounded-xl font-bold shadow-lg hover:bg-green-700 active:scale-95 transition-all text-lg">ਸ਼ਬਦ ਬਣਾਓ</button>
                <button onclick="switchTeam()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95 transition-all">ਟੀਮ ਬਦਲੋ</button>
            </div>
        </div>

        <!-- Compact Muharni Board -->
        <div class="p-3 bg-white muharni-scroll">
            <div id="muharniBoard" class="grid grid-cols-1 gap-2">
                <!-- Javascript will generate rows here -->
            </div>
        </div>
    </div>

    <script>
        const letters = [
            'ੳ', 'ਅ', 'ੲ', 'ਸ', 'ਹ', 'ਕ', 'ਖ', 'ਗ', 'ਘ', 'ਙ', 
            'ਚ', 'ਛ', 'ਜ', 'ਝ', 'ਞ', 'ਟ', 'ਠ', 'ਡ', 'ਢ', 'ਣ', 
            'ਤ', 'ਥ', 'ਦ', 'ਧ', 'ਨ', 'ਪ', 'ਫ', 'ਬ', 'ਭ', 'ਮ', 
            'ਯ', 'ਰ', 'ਲ', 'ਵ', 'ੜ', 'ਸ਼', 'ਖ਼', 'ਗ਼', 'ਜ਼', 'ਫ਼', 'ਲ਼'
        ];

        // Specific vowel rules as per instructions
        const specialVowels = {
            'ੳ': ['ਉ', 'ਊ', 'ਓ'],
            'ਅ': ['ਅ', 'ਆ', 'ਐ', 'ਔ'],
            'ੲ': ['ਇ', 'ਈ', 'ਏ']
        };

        // Standard Matras (Removed Addak and standalone Bindi, added Kanna-Bindi at the end)
        const standardMatras = ['', 'ਾ', 'ਿ', 'ੀ', 'ੁ', 'ੂ', 'ੇ', 'ੈ', 'ੋ', 'ੌ', 'ੰ', 'ਾਂ'];

        // Color mapping for matras to keep them consistent across rows
        const matraColors = [
            'bg-slate-100 text-slate-800',   // Mukta
            'bg-red-100 text-red-800',     // Kanna
            'bg-blue-100 text-blue-800',    // Siari
            'bg-green-100 text-green-800',  // Biari
            'bg-yellow-100 text-yellow-800',// Onkar
            'bg-orange-100 text-orange-800',// Dulankar
            'bg-purple-100 text-purple-800',// Lan
            'bg-pink-100 text-pink-800',    // Dulan
            'bg-cyan-100 text-cyan-800',    // Hora
            'bg-indigo-100 text-indigo-800',// Kanora
            'bg-teal-100 text-teal-800',    // Tippi
            'bg-rose-100 text-rose-800',    // Kanna-Bindi
        ];

        let currentWord = [];
        let scoreA = 0;
        let scoreB = 0;
        let activeTeam = 'A';

        function init() {
            const board = document.getElementById('muharniBoard');
            
            letters.forEach(letter => {
                const row = document.createElement('div');
                row.className = "flex flex-wrap items-center gap-1 border-b border-gray-100 pb-2 hover:bg-slate-50 transition-colors";
                
                // Row indicator
                const label = document.createElement('div');
                label.className = "w-6 text-center font-bold text-gray-400 text-sm";
                label.innerText = letter;
                row.appendChild(label);

                // Container for buttons
                const btnContainer = document.createElement('div');
                btnContainer.className = "flex flex-wrap gap-1 flex-1";

                let variations = [];
                if (specialVowels[letter]) {
                    variations = specialVowels[letter];
                } else {
                    variations = standardMatras.map(m => letter + m);
                }

                variations.forEach((v, idx) => {
                    const btn = document.createElement('button');
                    // Use matra index to assign colors for standard consonants
                    // For special vowels, we assign colors manually or use a default
                    let colorClass = specialVowels[letter] ? 'bg-orange-100 text-orange-800' : matraColors[idx];
                    
                    btn.className = `matra-btn min-w-[42px] h-10 flex items-center justify-center rounded-lg shadow-sm border border-black/5 font-black text-xl ${colorClass}`;
                    btn.innerText = v;
                    btn.onclick = () => addToWord(v);
                    btnContainer.appendChild(btn);
                });

                row.appendChild(btnContainer);
                board.appendChild(row);
            });
        }

        function addToWord(char) {
            currentWord.push(char);
            renderWord();
            document.getElementById('statusMsg').innerText = "";
        }

        function renderWord() {
            const display = document.getElementById('wordDisplay');
            if (currentWord.length === 0) {
                display.innerHTML = '<span class="text-gray-300 text-lg italic font-normal">ਅੱਖਰਾਂ ਨੂੰ ਛੂਹ ਕੇ ਸ਼ਬਦ ਬਣਾਓ...</span>';
                return;
            }
            display.innerHTML = currentWord.map(c => `<span class="px-1">${c}</span>`).join('');
        }

        function clearWord() {
            currentWord = [];
            renderWord();
            document.getElementById('statusMsg').innerText = "ਸ਼ਬਦ ਸਾਫ਼ ਕੀਤਾ ਗਿਆ";
        }

        function switchTeam() {
            activeTeam = (activeTeam === 'A') ? 'B' : 'A';
            document.getElementById('teamA').classList.toggle('active-team-card', activeTeam === 'A');
            document.getElementById('teamA').classList.toggle('opacity-70', activeTeam !== 'A');
            document.getElementById('teamB').classList.toggle('active-team-card', activeTeam === 'B');
            document.getElementById('teamB').classList.toggle('opacity-70', activeTeam !== 'B');
            
            const turnTag = document.getElementById('turnTag');
            turnTag.innerText = `ਵਾਰੀ: ਟੀਮ ${activeTeam === 'A' ? 'ੳ' : 'ਅ'}`;
            turnTag.className = `font-black px-4 py-1 rounded-full shadow-md text-sm whitespace-nowrap ${activeTeam === 'A' ? 'bg-white text-orange-600' : 'bg-white text-blue-600'}`;
        }

        function checkWord() {
            if (currentWord.length === 0) return;
            
            // Points based on number of letter combinations (ignoring matras as requested)
            const points = currentWord.length; 
            
            if (activeTeam === 'A') {
                scoreA += points;
                document.getElementById('scoreA').innerText = scoreA;
            } else {
                scoreB += points;
                document.getElementById('scoreB').innerText = scoreB;
            }

            const msg = document.getElementById('statusMsg');
            msg.innerText = `ਬਹੁਤ ਵਧੀਆ! ${points} ਅੰਕ ਪ੍ਰਾਪਤ ਹੋਏ।`;
            msg.className = "text-center text-sm font-bold mt-2 text-green-600 h-5 animate-pulse";
            
            triggerFlowers();
            
            setTimeout(() => {
                clearWord();
                msg.className = "text-center text-sm font-bold mt-2 text-gray-500 h-5";
            }, 2000);
        }

        function triggerFlowers() {
            const flowers = ['🌸', '🌼', '🌻', '🌺', '🌹', '🌷'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const f = document.createElement('div');
                    f.className = 'flower';
                    f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    f.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 4000);
                }, i * 60);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
